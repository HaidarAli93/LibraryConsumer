services:
  app:
    build:
      context: .
      dockerfile: dockerfile
      target: app
    container_name: library-consumer-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
    extra_hosts:
      - "library-owner.test:host-gateway"
    volumes:
      - storage-app-public:/var/www/storage/app/public

  web:
    build:
      context: .
      dockerfile: dockerfile
      target: web
    container_name: library-consumer-web
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - app
    volumes:
      - storage-app-public:/var/www/public/storage

  mysql:
    image: mysql:8.4
    container_name: library-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data:
  storage-app-public:
